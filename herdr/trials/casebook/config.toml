# Isolated Casebook trial config. Herdr source reference:
# 02a6e874f67800891b5a549297219ed6f3ce0f2f (not live validated).
onboarding = false

[terminal]
shell_mode = "auto"
new_cwd = "follow"

[session]
resume_agents_on_restore = false

[experimental]
pane_history = false

[keys]
prefix = "ctrl+space"
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"
split_vertical = "prefix+v"
split_horizontal = "prefix+s"
next_tab = "alt+n"
previous_tab = "alt+p"
next_workspace = "prefix+n"
previous_workspace = "prefix+p"
last_pane = ["alt+space", "prefix+space"]

[theme]
name = "terminal"

[theme.custom]
panel_bg = "#2e3440"
accent = "#88c0d0"
green = "#a3be8c"
blue = "#81a1c1"
red = "#bf616a"
yellow = "#ebcb8b"

# aryk.pins offline wiring; linking/live validation are separate gates.
# Accepted prefix+H/T intentionally override Herdr defaults swap-left/rename-tab.
[[keys.command]]
key = "prefix+h"
type = "plugin_action"
command = "aryk.pins.pin-project"
description = "pin current project"

[[keys.command]]
key = "prefix+H"
type = "plugin_action"
command = "aryk.pins.manage-projects"
description = "manage project pins"

[[keys.command]]
key = "prefix+t"
type = "plugin_action"
command = "aryk.pins.pin-local"
description = "pin current local thread"

[[keys.command]]
key = "prefix+T"
type = "plugin_action"
command = "aryk.pins.manage-locals"
description = "manage local pins"

[[keys.command]]
key = "alt+j"
type = "plugin_action"
command = "aryk.pins.activate-project-1"
description = "open project pin 1"

[[keys.command]]
key = "alt+k"
type = "plugin_action"
command = "aryk.pins.activate-project-2"
description = "open project pin 2"

[[keys.command]]
key = "alt+l"
type = "plugin_action"
command = "aryk.pins.activate-project-3"
description = "open project pin 3"

[[keys.command]]
key = "alt+;"
type = "plugin_action"
command = "aryk.pins.activate-project-4"
description = "open project pin 4"

[[keys.command]]
key = "alt+m"
type = "plugin_action"
command = "aryk.pins.activate-local-1"
description = "open local pin 1"

[[keys.command]]
key = "alt+,"
type = "plugin_action"
command = "aryk.pins.activate-local-2"
description = "open local pin 2"

[[keys.command]]
key = "alt+."
type = "plugin_action"
command = "aryk.pins.activate-local-3"
description = "open local pin 3"

[[keys.command]]
key = "alt+/"
type = "plugin_action"
command = "aryk.pins.activate-local-4"
description = "open local pin 4"
